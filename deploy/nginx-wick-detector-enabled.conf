# HTTP 重定向到 HTTPS
server {
    listen 80;
    server_name wickdetector.com www.wickdetector.com;
    return 301 https://$server_name$request_uri;
}

# HTTPS 配置
server {
    listen 443 ssl http2;
    server_name wickdetector.com www.wickdetector.com;

    # SSL 证书
    ssl_certificate /etc/letsencrypt/live/wickdetector.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wickdetector.com/privkey.pem;
    
    # SSL 优化配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Logo 图标
    location /logo.png {
        root /var/www/html;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Favicon
    location /favicon.ico {
        alias /var/www/html/logo.png;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Flask 应用作为根路径（应用层 + 可选 Redis 限流；网关限流见 deploy/nginx-rate-limit.conf）
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }
}
