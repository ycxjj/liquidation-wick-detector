<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WickShield 投保</title>
    <link rel="icon" type="image/png" href="/logo.png?v=4">
    <style>
:root{--bg:#070b1a;--card:#10192e;--border:#1e3a5f;--accent:#00d4ff;--muted:#8892b0;--text:#e8edf7;--ok:#34d399;--danger:#f87171}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.wrap{max-width:720px;margin:0 auto;padding:24px 16px 48px}
.hero{text-align:center;margin-bottom:20px}
.hero h1{color:var(--accent);font-size:1.6rem}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:16px}
label{display:block;font-size:.8rem;color:var(--muted);margin:8px 0 4px}
input,select{width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);background:#0a1020;color:var(--text)}
.btn{background:var(--accent);color:#042;border:none;padding:10px 16px;border-radius:8px;font-weight:700;cursor:pointer;margin-top:12px;width:100%}
.btn.secondary{background:transparent;border:1px solid var(--border);color:var(--text)}
.meta{font-size:.78rem;color:var(--muted);margin-top:8px;line-height:1.5}
.alert{padding:10px;border-radius:8px;margin-top:10px;font-size:.85rem}
.alert.ok{background:rgba(52,211,153,.12);color:var(--ok)}
.alert.err{background:rgba(248,113,113,.12);color:var(--danger)}
.alert.info{background:rgba(0,212,255,.1);color:var(--accent)}
#quoteBox{display:none}
.policy-list{font-size:.85rem}
.policy-list li{margin:6px 0;list-style:none;padding:10px;border-bottom:1px solid rgba(30,58,95,.4);display:flex;flex-wrap:wrap;align-items:center;gap:8px;justify-content:space-between}
.policy-list .policy-main{flex:1;min-width:200px}
.policy-list .btn-pay{width:auto;margin:0;padding:8px 14px;font-size:.8rem}
.status-pending{color:var(--accent)}
.status-active{color:var(--ok)}
.status-expired{color:var(--muted)}
.wallet-info{margin-top:14px;padding:12px 14px;background:rgba(0,212,255,.05);border:1px solid var(--border);border-radius:8px;font-size:.82rem;color:var(--muted);line-height:1.65}
.wallet-info strong{color:var(--text)}
.wallet-rec{margin:8px 0 0;padding-left:0;list-style:none}
.wallet-rec li{margin:5px 0;padding-left:0}
.wallet-rec a{color:var(--accent);text-decoration:none}
.wallet-rec a:hover{text-decoration:underline}
@media (max-width:720px){
.wrap{padding:16px 12px 40px}
.hero h1{font-size:1.35rem}
.policy-list li{flex-direction:column;align-items:stretch}
.policy-list .btn-pay{width:100%;margin-top:8px}
}
    </style>
</head>
<body>
<div class="wrap">
    <div class="hero"><h1>WickShield 投保</h1><p class="meta">保单报价 → 链上支付 USDT → 激活保单</p></div>
    {% set nav_active = 'insure' %}
    {% include 'partials/site_nav.html' %}

    <div class="card" id="loginCard">
        <h2 style="font-size:1rem;color:var(--accent);margin-bottom:10px">1. 钱包登录</h2>
        <button type="button" class="btn" id="btnConnect">钱包登录</button>
        <div class="wallet-info">
            <p><strong>推荐使用：</strong></p>
            <ul class="wallet-rec">
                <li>• <a href="https://metamask.io/download/" target="_blank" rel="noopener noreferrer">MetaMask</a> (最流行)</li>
                <li>• <a href="https://www.okx.com/web3" target="_blank" rel="noopener noreferrer">OKX Wallet</a></li>
                <li>• <a href="https://www.coinbase.com/wallet" target="_blank" rel="noopener noreferrer">Coinbase Wallet</a></li>
            </ul>
        </div>
        <p class="meta" id="walletMeta">未登录</p>
    </div>

    <div class="card" id="formCard" style="opacity:.5;pointer-events:none">
        <h2 style="font-size:1rem;color:var(--accent);margin-bottom:10px">2. 填写保单</h2>
        <label>交易对</label>
        <input id="symbol" value="BTC/USDT" placeholder="如 BTC/USDT">
        <label>保额 (USDT)</label>
        <input id="coverage" type="number" value="1000" min="10" step="10">
        <label>保障天数</label>
        <input id="days" type="number" value="7" min="1" max="30">
        <label>杠杆（精算用）</label>
        <input id="leverage" type="number" value="10" min="1" max="50">
        <label>产品线</label>
        <select id="tier">
            <option value="basic">basic</option>
            <option value="enhanced">enhanced</option>
            <option value="ultimate">ultimate</option>
        </select>
        <button type="button" class="btn" id="btnQuote">获取报价（新建保单）</button>
    </div>

    <div class="card">
        <h2 style="font-size:1rem;color:var(--accent)">我的保单</h2>
        <p class="meta" style="margin-bottom:8px">状态为「待支付」的保单可点 <strong>继续支付</strong>，无需重新报价。</p>
        <ul class="policy-list" id="policyList"><li class="meta">登录后加载</li></ul>
    </div>

    <div class="card" id="quoteBox">
        <h2 style="font-size:1rem;color:var(--accent)">3. 支付保费</h2>
        <p id="quoteText" class="meta">在上方列表点击「继续支付」，或新建保单后在此支付。</p>
        <label>链上交易哈希 (tx hash)</label>
        <input id="txHash" placeholder="0x...">
        <button type="button" class="btn" id="btnConfirm">提交哈希并激活保单</button>
        <div id="payAlert"></div>
    </div>
</div>
<script>
let wallet=null, pendingPolicyId=null;
const STATUS_ZH={pending_payment:'待支付',active:'已生效',expired:'已过期',cancelled:'已取消'};
function showAlert(el,msg,cls){el.innerHTML='<div class="alert '+cls+'">'+msg+'</div>';}
function statusLabel(s){return STATUS_ZH[s]||s;}
function showPayPanel(info){
  pendingPolicyId=info.policy_id||info.policy?.id;
  document.getElementById('quoteBox').style.display='block';
  document.getElementById('quoteText').innerHTML=
    '<strong>'+(info.policy_no||'')+'</strong> · '+(info.policy?.symbol||'')+' · 保额 '+(info.policy?.coverage_amount||'')+'U<br>'+
    '应付 <strong>'+info.premium_usdt+' USDT</strong><br>资金库: <code>'+(info.treasury_address||'')+'</code><br>'+
    'USDT: <code>'+(info.usdt_contract||'')+'</code> · chain '+(info.chain_id||'')+'<br>'+
    (info.payout_address?'赔付地址: '+info.payout_address:'');
  document.getElementById('txHash').value='';
  document.getElementById('quoteBox').scrollIntoView({behavior:'smooth',block:'start'});
  showAlert(document.getElementById('payAlert'),info.payment_hint||'转账后粘贴 tx hash','info');
}
async function readJson(r){
  const text=await r.text();
  try{return JSON.parse(text);}catch(e){
    throw new Error(r.status+' 非JSON: '+text.slice(0,120));
  }
}
async function connectWallet(){
  if(!window.ethereum){alert('请安装 Web3 钱包（推荐 MetaMask、OKX Wallet 或 Coinbase Wallet）');return;}
  const accounts=await window.ethereum.request({method:'eth_requestAccounts'});
  wallet=accounts[0];
  const nonceRes=await fetch('/api/points/nonce',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({wallet_address:wallet})});
  const {nonce}=await nonceRes.json();
  const signature=await window.ethereum.request({method:'personal_sign',params:[nonce,wallet]});
  const loginRes=await fetch('/api/points/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({wallet_address:wallet,signature,nonce})});
  if(!loginRes.ok){const e=await loginRes.json();alert(e.error||'登录失败');return;}
  document.getElementById('walletMeta').textContent='已登录: '+wallet.slice(0,8)+'…'+wallet.slice(-6);
  document.getElementById('formCard').style.opacity='1';
  document.getElementById('formCard').style.pointerEvents='auto';
  loadPolicies();
}
async function loadPolicies(){
  const r=await fetch('/api/wickshield/policies/mine');
  const d=await readJson(r);
  const ul=document.getElementById('policyList');
  if(!d.success||!d.policies||!d.policies.length){ul.innerHTML='<li class="meta">暂无保单</li>';return;}
  ul.innerHTML=d.policies.map(p=>{
    const st=p.status;
    const cls=st==='pending_payment'?'status-pending':(st==='active'?'status-active':'status-expired');
    const payBtn=st==='pending_payment'
      ? '<button type="button" class="btn btn-pay" data-pay-id="'+p.id+'">继续支付</button>'
      : '';
    return '<li><div class="policy-main"><strong>'+p.policy_no+'</strong> · '+p.symbol+' · '+p.coverage_amount+'U · '+
      '<span class="'+cls+'">'+statusLabel(st)+'</span>'+
      (p.premium_usdt!=null?' · 保费 '+p.premium_usdt+'U':'')+
      (p.expires_at&&st==='active'?' · 至 '+p.expires_at.slice(0,10):'')+'</div>'+payBtn+'</li>';
  }).join('');
  ul.querySelectorAll('[data-pay-id]').forEach(btn=>{
    btn.onclick=async()=>{
      const id=btn.getAttribute('data-pay-id');
      const alertEl=document.getElementById('payAlert');
      try{
        const pr=await fetch('/api/wickshield/policies/'+id+'/pay-info');
        const info=await readJson(pr);
        if(!info.success){showAlert(alertEl,info.error||'加载失败','err');return;}
        showPayPanel(info);
      }catch(e){showAlert(alertEl,String(e.message||e),'err');}
    };
  });
}
document.getElementById('btnConnect').onclick=connectWallet;
document.getElementById('btnQuote').onclick=async()=>{
  const body={symbol:document.getElementById('symbol').value.trim(),coverage_amount:+document.getElementById('coverage').value,days:+document.getElementById('days').value,leverage:+document.getElementById('leverage').value,product_tier:document.getElementById('tier').value};
  const alertEl=document.getElementById('payAlert');
  try{
  const q=await fetch('/api/wickshield/quote',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const d=await readJson(q);
  if(!d.success){showAlert(alertEl,d.error||'报价失败','err');return;}
  const create=await fetch('/api/wickshield/policies',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const c=await readJson(create);
  if(!c.success){showAlert(alertEl,c.error||'创建保单失败','err');return;}
  showPayPanel({
    policy_id:c.policy.id,
    policy_no:c.policy.policy_no,
    policy:c.policy,
    premium_usdt:c.premium_usdt,
    treasury_address:c.treasury_address,
    usdt_contract:c.usdt_contract,
    chain_id:c.chain_id,
    payout_address:c.policy.payout_address,
    payment_hint:'请用已连接钱包向资金库转入保费后，粘贴 tx hash'
  });
  loadPolicies();
  }catch(e){showAlert(alertEl,String(e.message||e),'err');}
};
document.getElementById('btnConfirm').onclick=async()=>{
  const tx=document.getElementById('txHash').value.trim();
  if(!pendingPolicyId||!tx){alert('请先选择待支付保单或获取报价，并填写 tx hash');return;}
  const r=await fetch('/api/wickshield/policies/'+pendingPolicyId+'/confirm',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({premium_tx_hash:tx})});
  const d=await readJson(r);
  const alertEl=document.getElementById('payAlert');
  if(d.success){showAlert(alertEl,'保单已激活: '+d.policy.policy_no,'ok');loadPolicies();}
  else showAlert(alertEl,d.error||'确认失败','err');
};
fetch('/api/wickshield/policies/mine').then(readJson).then(d=>{if(d.success&&d.policies&&d.policies.length){document.getElementById('formCard').style.opacity='1';document.getElementById('formCard').style.pointerEvents='auto';document.getElementById('walletMeta').textContent='已登录（会话）';loadPolicies();}}).catch(()=>{});
</script>
</body>
</html>
