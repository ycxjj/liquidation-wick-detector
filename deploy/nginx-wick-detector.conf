server {
    listen 443 ssl http2;
    server_name 104.238.160.219 104.238.160.219.nip.io;
    ssl_certificate /etc/letsencrypt/live/104.238.160.219.nip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/104.238.160.219.nip.io/privkey.pem;

    location /logo.png {
        root /var/www/html;
    }

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 600s;
    }
}

server {
    listen 80;
    server_name 104.238.160.219 104.238.160.219.nip.io;
    return 301 https://$host$request_uri;
}
