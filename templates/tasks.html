<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日任务 - Wick Detector</title>
    <link rel="icon" type="image/png" href="/logo.png?v=4">
    <style>
:root{--bg:#070b1a;--card:#10192e;--border:#1e3a5f;--accent:#00d4ff;--muted:#8892b0;--text:#e8edf7}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:20px}
.container{max-width:900px;margin:0 auto}
h1{color:var(--accent);margin-bottom:12px;text-align:center}
.subtitle{text-align:center;color:var(--muted);margin-bottom:30px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:20px}
.task-item{display:flex;justify-content:space-between;align-items:center;padding:15px;border-bottom:1px solid var(--border)}
.task-item:last-child{border-bottom:none}
.task-info h3{color:var(--text);font-size:1rem;margin-bottom:5px}
.task-info p{color:var(--muted);font-size:.85rem}
.task-reward{color:var(--accent);font-weight:700;margin-right:15px}
.btn{background:var(--accent);color:#042;font-weight:700;border:none;padding:8px 20px;border-radius:8px;cursor:pointer}
.btn:disabled{opacity:.4;cursor:not-allowed}
.loading{text-align:center;padding:40px;color:var(--muted)}
    </style>
</head>
<body>
<div class="container">
    <h1>📋 每日任务</h1>
    <p class="subtitle">完成任务获取积分奖励</p>
    {% set nav_active = 'points' %}
    {% include 'partials/site_nav.html' %}
    <div class="card">
        <div id="tasksList" class="loading">加载中...</div>
    </div>
</div>
<script>
async function loadTasks() {
    try {
        // 添加时间戳防止缓存
        const res = await fetch('/api/points/tasks?_t=' + Date.now());
        const data = await res.json();
        
        const list = document.getElementById('tasksList');
        if (!data.tasks || data.tasks.length === 0) {
            list.innerHTML = '<div style="text-align:center;color:var(--muted);">暂无任务</div>';
            return;
        }
        
        list.innerHTML = data.tasks.map(task => `
            <div class="task-item">
                <div class="task-info">
                    <h3>${task.completed ? '✓ ' : ''}${task.name}</h3>
                    <p>${task.description}</p>
                    <p style="color:var(--accent);font-size:.8rem;margin-top:5px;">今日进度: ${task.progress}</p>
                </div>
                <div style="display:flex;align-items:center">
                    <span class="task-reward">+${task.points} 积分</span>
                    <button class="btn" id="btn-${task.id}" ${task.completed ? 'disabled' : ''} onclick="completeTask('${task.id}')">
                        ${task.completed ? '✓ 已完成' : '去完成'}
                    </button>
                </div>
            </div>
        `).join('');
    } catch (err) {
        console.error('加载任务失败:', err);
        document.getElementById('tasksList').innerHTML = '<div style="color:#f44;">加载失败，请刷新重试</div>';
    }
}

async function completeTask(taskId) {
    const btn = document.getElementById('btn-' + taskId);
    if (!btn || btn.disabled) return;
    
    const originalText = btn.textContent;
    btn.disabled = true;
    btn.textContent = '处理中...';
    
    try {
        if (taskId === 'daily_checkin') {
            const res = await fetch('/api/points/checkin', { method: 'POST' });
            const data = await res.json();
            
            if (data.success) {
                // 立即更新按钮状态
                btn.textContent = '✓ 已完成';
                alert('✓ ' + data.message);
                // 延迟重新加载任务列表，确保后端数据已更新
                await new Promise(resolve => setTimeout(resolve, 800));
                await loadTasks();
            } else {
                alert('✗ ' + data.message);
                // 即使失败也重新加载，可能已经签到过了
                await loadTasks();
            }
        } else if (taskId === 'detection') {
            // 跳转到检测页面
            window.location.href = '/detect';
        } else {
            alert('该任务功能开发中');
            btn.disabled = false;
            btn.textContent = originalText;
        }
    } catch (err) {
        console.error('完成任务失败:', err);
        alert('操作失败，请重试');
        btn.disabled = false;
        btn.textContent = originalText;
    }
}

loadTasks();
</script>
</body>
</html>
