# 在 http {} 块中 include（与主站 server 配置配合）
# 示例：/etc/nginx/conf.d/wick-rate-limit.conf

limit_req_zone $binary_remote_addr zone=wick_auth:10m rate=20r/m;
limit_req_zone $binary_remote_addr zone=wick_detect:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=wick_api:10m rate=240r/m;

# 在 server {} 的 location 中使用：
#
# location ~ ^/api/points/(login|nonce) {
#     limit_req zone=wick_auth burst=5 nodelay;
#     proxy_pass http://127.0.0.1:5000;
#     ...
